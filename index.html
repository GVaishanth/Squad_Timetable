<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squad Timetable</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #1a1a2e;
  min-height: 100vh;
  color: white;
  padding: 15px;
}
.container { max-width: 1800px; margin: 0 auto; }

/* HEADER */
.header { text-align:center; margin-bottom:18px; }
.header h1 {
  font-size: 1.8rem;
  background: linear-gradient(90deg, #00d4ff, #9b59b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.clock-box {
  background: #16213e;
  border-radius: 12px;
  padding: 8px 28px;
  display: inline-block;
  border: 1px solid #2d2d5a;
}
.clock {
  font-size: 2.4rem;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  color: #00d4ff;
  letter-spacing: 2px;
}
.date { color: #888; font-size: 0.82rem; margin-top: 2px; }

/* PROFILES */
.profiles-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
@media(max-width:1100px){ .profiles-grid{ grid-template-columns: repeat(3,1fr); } }
@media(max-width:600px)  { .profiles-grid{ grid-template-columns: repeat(2,1fr); } }

.profile-card {
  background: #16213e;
  border-radius: 12px;
  padding: 14px 12px;
  border: 1px solid #2d2d5a;
  border-top: 4px solid var(--accent);
  text-align: center;
}
.profile-emoji { font-size: 2rem; margin-bottom: 4px; }
.profile-name  { font-size: 1rem; font-weight: bold; margin-bottom: 8px; }
.profile-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: bold;
  margin-bottom: 8px;
}
.badge-in      { background: #1e6e3e; color: #6effa6; }
.badge-out     { background: #6e1e1e; color: #ffa6a6; }
.badge-lunch   { background: #7d4e00; color: #ffc97e; }
.badge-free    { background: #1a3a5c; color: #7ec8ff; }
.badge-weekend { background: #3a2d5c; color: #c8b0ff; }

/* ── IN-CLASS bubble ── */
.class-bubble {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: linear-gradient(135deg, #6e1e1e, #3d0a0a);
  border: 1px solid rgba(255,100,100,0.35);
  border-radius: 10px;
  padding: 7px 10px;
  margin-bottom: 7px;
  text-align: left;
}
.class-bubble-icon { font-size: 1rem; flex-shrink: 0; }
.class-bubble-text { flex: 1; min-width: 0; }
.class-bubble-label {
  font-size: 0.7rem;
  color: #ffa6a6;
  font-weight: bold;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.class-bubble-room {
  display: inline-block;
  background: rgba(255,80,80,0.25);
  border: 1px solid rgba(255,100,100,0.5);
  border-radius: 5px;
  padding: 1px 7px;
  font-size: 0.8rem;
  font-weight: bold;
  color: #fff;
  letter-spacing: 0.8px;
  margin-top: 2px;
}
.class-bubble-name {
  font-size: 0.62rem;
  color: #cc8888;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── NEXT-CLASS bubble ── */
.next-bubble {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #0f172a;
  border: 1px solid #2d3561;
  border-radius: 10px;
  padding: 7px 10px;
  margin-bottom: 6px;
  text-align: left;
}
.next-bubble-icon { font-size: 0.9rem; flex-shrink: 0; }
.next-bubble-text { flex: 1; min-width: 0; }
.next-bubble-label {
  font-size: 0.62rem;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.next-bubble-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
  flex-wrap: wrap;
}
.next-bubble-time {
  font-size: 0.78rem;
  font-weight: bold;
  color: #fff;
}
.next-bubble-room {
  display: inline-block;
  background: rgba(100,130,200,0.2);
  border: 1px solid rgba(100,130,200,0.4);
  border-radius: 5px;
  padding: 1px 7px;
  font-size: 0.72rem;
  font-weight: bold;
  color: #7eb8ff;
  letter-spacing: 0.6px;
}

/* ── FREE-AT bubble (shown when in class, replaces next-class) ── */
.free-bubble {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #0a1a0f;
  border: 1px solid #1a4a28;
  border-radius: 10px;
  padding: 7px 10px;
  margin-bottom: 6px;
}
.free-bubble-label { font-size: 0.62rem; color: #4a8a5a; text-transform: uppercase; letter-spacing: 0.4px; }
.free-bubble-time  { font-size: 0.78rem; font-weight: bold; color: #6effa6; margin-top: 2px; }

/* ── SIMPLE status line (lunch, weekend, etc.) ── */
.profile-next  { font-size: 0.72rem; color: #aaa; line-height: 1.6; margin-bottom: 4px; }
.profile-next strong { color: #fff; }

/* LEGEND */
.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 6px 0 20px;
  flex-wrap: wrap;
  font-size: 0.75rem;
  color: #888;
}
.legend span { display:flex; align-items:center; gap:5px; }
.ld { width:10px; height:10px; border-radius:2px; display:inline-block; }

/* TIMETABLES */
.timetables-section { display:flex; flex-direction:column; gap:28px; }
.tt-block {
  background: #16213e;
  border-radius: 12px;
  border: 1px solid #2d2d5a;
  overflow: hidden;
}
.tt-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid #2d2d5a;
  border-left: 5px solid var(--accent);
}
.tt-header-emoji { font-size: 1.5rem; }
.tt-header-name  { font-size: 1.1rem; font-weight: bold; flex:1; }

/* Mobile scroll fix: isolate horizontal scroll from vertical page scroll */
.tt-wrap {
  overflow-x: auto;
  overflow-y: visible;
  padding: 12px;
  /* Allow horizontal drag on touch without fighting page scroll */
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y;
  position: relative;
}
/* Subtle scroll hint on mobile */
@media(max-width:768px) {
  .tt-wrap::after {
    content: '← scroll →';
    display: block;
    text-align: center;
    font-size: 0.6rem;
    color: #2d3561;
    padding-top: 4px;
    letter-spacing: 1px;
  }
}

/* TIME NEEDLE */
.table-container {
  position: relative;
  display: inline-block;
  min-width: 100%;
}
.time-needle {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom,
    rgba(255,255,255,0.50) 0%,
    rgba(255,255,255,0.25) 40%,
    rgba(255,255,255,0.08) 80%,
    rgba(255,255,255,0.50) 100%
  );
  pointer-events: none;
  z-index: 10;
  transform: translateX(-50%);
  transition: left 0.9s linear;
}
/* Bright glowing dot at the top */
.time-needle::before {
  content: '';
  position: absolute;
  top: -3px;
  left: 50%;
  transform: translateX(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 0 8px 3px rgba(255,255,255,0.85),
              0 0 16px 4px rgba(200,220,255,0.5);
}
/* Bright glowing dot at the bottom */
.time-needle::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 50%;
  transform: translateX(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 0 8px 3px rgba(255,255,255,0.85),
              0 0 16px 4px rgba(200,220,255,0.5);
}

/* TABLE */
table.ffcs {
  border-collapse: collapse;
  width: 100%;
  min-width: 900px;
  font-size: 0.68rem;
}
table.ffcs th, table.ffcs td {
  border: 1px solid #2d3561;
  padding: 4px 3px;
  text-align: center;
  vertical-align: middle;
  white-space: nowrap;
}
.hdr-main     { background: #0f172a; color: #94a3b8; font-weight:bold; font-size:0.62rem; }
.hdr-sub      { background: #1e293b; color: #64748b; font-size:0.58rem; font-style:italic; }
.hdr-am       { background: #1e3a5f; color: #7eb8ff; }
.hdr-pm       { background: #1f2d1e; color: #7ec87e; }
.hdr-lunch-hdr{ background: #4a3000; color: #ffc97e; font-weight:bold; }
.hdr-none     { background: #111827; color: #2d3561; }

td.row-label { background:#1e293b; color:#94a3b8; font-weight:bold; font-size:0.68rem; width:42px; min-width:42px; }
td.row-label.today { background:#2d3a8a; color:#a0b4ff; }
td.lunch-cell {
  background:#4a3000 !important; color:#ffc97e !important;
  font-weight:bold; font-size:0.7rem;
  writing-mode:vertical-rl; letter-spacing:2px;
  min-width:28px; width:28px;
}
td.slot      { background:#0f172a; color:#2d3561; min-width:68px; max-width:100px; white-space:normal; }
td.slot-th   { background:#0d1f3a; color:#60a5fa; font-weight:bold; }
td.slot-lab  { background:#131f0a; color:#a3e635; font-weight:bold; }
td.slot-both { background:#101508; }
.t-part      { color:#60a5fa; font-weight:bold; }
.l-part      { color:#a3e635; font-weight:bold; }
.course-tag  { display:block; font-size:0.55rem; color:#94a3b8; margin-top:2px; white-space:normal; line-height:1.3; }
td.cur-class { background:#5c0a0a !important; box-shadow:inset 0 0 0 2px #ff4444; }
td.cur-class .t-part, td.cur-class .l-part, td.cur-class span { color:#fff !important; }
td.cur-class .course-tag { color:#ffaaaa !important; }
td.cur-free  { background:#0a3a1a !important; box-shadow:inset 0 0 0 2px #22c55e; }

.footer-note { text-align:center; color:#333; font-size:0.7rem; margin-top:12px; padding-bottom:10px; }
</style>
</head>

// ─── TIME HELPERS ─────────────────────────────────────────────────────────────
function nowMins() {
  var n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}
function todayCode() {
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date().getDay()];
}
function fmtTime(m) {
  var h = Math.floor(m / 60), min = m % 60;
  var ampm = h >= 12 ? 'PM' : 'AM';
  var hh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return hh + ':' + (min === 0 ? '00' : String(min).padStart(2,'0')) + ' ' + ampm;
}

// ─── CORE: is a person in class right now at a specific column? ───────────────
// Returns true if the person has a registered slot in col c on day d
// AND the current time falls within that slot's theory OR lab window.
function colCoversTime(col, mins, hasTheory, hasLab) {
  if (col === COL_LUNCH) return false;
  if (hasTheory && TH_START[col] !== null) {
    if (mins >= TH_START[col] && mins < TH_END[col]) return true;
  }
  if (hasLab && LAB_START[col] !== null) {
    if (mins >= LAB_START[col] && mins < LAB_END[col]) return true;
  }
  return false;
}

// Helper: get slot value (object {n,r}) or null
function slotVal(reg, type, code) {
  if (!code) return null;
  var v = reg[type][code];
  return v ? v : null;
}

function hasRegistered(person, day, col) {
  if (DAYS.indexOf(day) === -1 || col === COL_LUNCH) return false;
  var reg = person.registered[day];
  var ts = THEORY_SLOT[day][col];
  var ls = LAB_SLOT[day][col];
  return (ts && reg.theory[ts]) || (ls && reg.lab[ls]) ? true : false;
}

// Is this person in class right now?
function isInClassNow(person, day, mins) {
  if (DAYS.indexOf(day) === -1) return false;
  var reg = person.registered[day];
  for (var c = 0; c < 13; c++) {
    if (c === COL_LUNCH) continue;
    var ts = THEORY_SLOT[day][c];
    var ls = LAB_SLOT[day][c];
    var hasTh = ts && reg.theory[ts] ? true : false;
    var hasLb = ls && reg.lab[ls]    ? true : false;
    if (colCoversTime(c, mins, hasTh, hasLb)) return true;
  }
  return false;
}

// Returns { name, slot, room } of the current class, or null
function currentCourse(person, day, mins) {
  if (DAYS.indexOf(day) === -1) return null;
  var reg = person.registered[day];
  for (var c = 0; c < 13; c++) {
    if (c === COL_LUNCH) continue;
    var ts = THEORY_SLOT[day][c];
    var ls = LAB_SLOT[day][c];
    var thVal = ts ? reg.theory[ts] : null;
    var lbVal = ls ? reg.lab[ls]    : null;
    var hasTh = thVal ? true : false;
    var hasLb = lbVal ? true : false;
    if (colCoversTime(c, mins, hasTh, hasLb)) {
      // Prefer the window that actually covers right now
      if (hasTh && TH_START[c] !== null && mins >= TH_START[c] && mins < TH_END[c]) {
        return { name: thVal.n, slot: ts, room: thVal.r };
      }
      if (hasLb && LAB_START[c] !== null && mins >= LAB_START[c] && mins < LAB_END[c]) {
        return { name: lbVal.n, slot: ls, room: lbVal.r };
      }
      // fallback: return whichever is registered
      if (hasTh) return { name: thVal.n, slot: ts, room: thVal.r };
      if (hasLb) return { name: lbVal.n, slot: ls, room: lbVal.r };
    }
  }
  return null;
}

// When does the current class block end?
function classEndsAt(person, day, mins) {
  if (DAYS.indexOf(day) === -1) return null;
  var reg = person.registered[day];
  var latestEnd = 0;
  for (var c = 0; c < 13; c++) {
    if (c === COL_LUNCH) continue;
    var ts = THEORY_SLOT[day][c]; var ls = LAB_SLOT[day][c];
    var hasTh = ts && reg.theory[ts] ? true : false;
    var hasLb = ls && reg.lab[ls]    ? true : false;
    if (colCoversTime(c, mins, hasTh, hasLb)) {
      if (hasTh && TH_END[c] !== null)  latestEnd = Math.max(latestEnd, TH_END[c]);
      if (hasLb && LAB_END[c] !== null) latestEnd = Math.max(latestEnd, LAB_END[c]);
    }
  }
  var checkMins = latestEnd; var extended = true;
  while (extended) {
    extended = false;
    for (var c2 = 0; c2 < 13; c2++) {
      if (c2 === COL_LUNCH) continue;
      var ts2 = THEORY_SLOT[day][c2]; var ls2 = LAB_SLOT[day][c2];
      var hasTh2 = ts2 && reg.theory[ts2] ? true : false;
      var hasLb2 = ls2 && reg.lab[ls2]    ? true : false;
      if (colCoversTime(c2, checkMins, hasTh2, hasLb2)) {
        var newEnd = 0;
        if (hasTh2 && TH_END[c2])  newEnd = Math.max(newEnd, TH_END[c2]);
        if (hasLb2 && LAB_END[c2]) newEnd = Math.max(newEnd, LAB_END[c2]);
        if (newEnd > latestEnd) { latestEnd = newEnd; checkMins = latestEnd; extended = true; }
      }
    }
  }
  return latestEnd > 0 ? fmtTime(latestEnd) : null;
}

// When is the next class?
// Returns { time:'9:00 AM', room:'PRP472', name:'BACSE202...' } or null
function nextClassAt(person, day, mins) {
  if (DAYS.indexOf(day) === -1) return null;

  // Search today first, then subsequent days
  var searchDays = [];
  searchDays.push({ dayCode: day, reg: person.registered[day], prefix: '' });
  var di = DAYS.indexOf(day);
  for (var d = di + 1; d < DAYS.length; d++) {
    searchDays.push({ dayCode: DAYS[d], reg: person.registered[DAYS[d]], prefix: DAYS[d] + ' ' });
  }

  for (var sd = 0; sd < searchDays.length; sd++) {
    var dayCode = searchDays[sd].dayCode;
    var reg     = searchDays[sd].reg;
    var prefix  = searchDays[sd].prefix;
    var minTime = (sd === 0) ? mins : -1; // only filter by mins on today

    // Collect all upcoming slots with their start time + room
    var candidates = [];
    for (var c = 0; c < 13; c++) {
      if (c === COL_LUNCH) continue;
      var ts = THEORY_SLOT[dayCode][c];
      var ls = LAB_SLOT[dayCode][c];
      var thVal = ts ? reg.theory[ts] : null;
      var lbVal = ls ? reg.lab[ls]    : null;

      // Theory slot
      if (thVal && TH_START[c] !== null && TH_START[c] > minTime) {
        candidates.push({ t: TH_START[c], room: thVal.r, name: thVal.n, prefix: prefix });
      }
      // Lab slot
      if (lbVal && LAB_START[c] !== null && LAB_START[c] > minTime) {
        candidates.push({ t: LAB_START[c], room: lbVal.r, name: lbVal.n, prefix: prefix });
      }
    }

    if (candidates.length > 0) {
      candidates.sort(function(a, b) { return a.t - b.t; });
      var best = candidates[0];
      return { time: best.prefix + fmtTime(best.t), room: best.room, name: best.name };
    }
  }
  return null;
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function statusOf(person, day, mins) {
  if (DAYS.indexOf(day) === -1) {
    return { badge:'badge-weekend', label:'🏖️ Weekend', nextLabel:'', nextVal:'Enjoy!', course:null, nextClass:null };
  }
  if (mins < 480) {
    var nc0 = nextClassAt(person, day, mins);
    return { badge:'badge-free', label:'😴 Before class', nextLabel:'Classes start at', nextVal:'8:00 AM', course:null, nextClass:nc0 };
  }
  if (mins >= 1160) {
    return { badge:'badge-in', label:'🏠 In Room', nextLabel:'Done for today!', nextVal:'', course:null, nextClass:null };
  }
  if (mins >= 780 && mins < 840) {
    var nc1 = nextClassAt(person, day, mins);
    return { badge:'badge-lunch', label:'🍽️ Lunch', nextLabel:'Back at', nextVal:'2:00 PM', course:null, nextClass:nc1 };
  }
  if (isInClassNow(person, day, mins)) {
    var ends = classEndsAt(person, day, mins);
    var cc   = currentCourse(person, day, mins);
    return { badge:'badge-out', label:'📚 In Class', nextLabel:'Free at', nextVal:ends || '—', course:cc, nextClass:null };
  }
  var nxt = nextClassAt(person, day, mins);
  return { badge:'badge-in', label:'🏠 In Room', nextLabel:'Next class:', nextVal: nxt ? nxt.time : 'No more today', course:null, nextClass:nxt };
}

// ─── HIGHLIGHT: which column is "current" for table display ──────────────────
// (used only for cell highlighting, not for status logic)
function currentDisplayCol(mins) {
  if (mins >= 780 && mins < 840) return COL_LUNCH;
  // Find col whose theory OR lab window covers mins
  for (var c = 0; c < 13; c++) {
    if (c === COL_LUNCH) continue;
    var inTh  = TH_START[c]  !== null && mins >= TH_START[c]  && mins < TH_END[c];
    var inLab = LAB_START[c] !== null && mins >= LAB_START[c] && mins < LAB_END[c];
    if (inTh || inLab) return c;
  }
  return -1;
}

// ─── NEEDLE POSITION ─────────────────────────────────────────────────────────
// Returns 0..1 fraction of how far through the day's visible timeline we are.
// Timeline: 8:00 (480) → 19:20 (1160), with lunch gap 13:00-14:00 excluded.
// Total active minutes = (780-480) + (1160-840) = 300 + 320 = 620 mins
// We map current time to a pixel position across the table.
//
// The table has 13 data columns + 1 day-label column.
// We need to find the LEFT edge pixel of the current position.
// Strategy: measure the column positions at runtime via getBoundingClientRect.
// We store needle position as a percentage of the table container width.
// This is computed in updateNeedles() at runtime.

// Non-overlapping, contiguous column time boundaries for needle positioning.
// Each column owns an exclusive slice of the day's timeline so the needle
// maps cleanly to exactly one column at any given time.
// Boundaries chosen using theory-slot starts as dividers; lab-only cols
// (c5, c12) get the remaining sliver before lunch / end-of-day.
//
// col:  0    1    2    3    4    5   6(L)   7    8    9   10   11   12
var NEEDLE_COL_START = [480, 540, 591, 660, 700, 770, 780, 840, 900,  951, 1020, 1060, 1131];
var NEEDLE_COL_END   = [540, 591, 660, 700, 770, 780, 840, 900, 951, 1020, 1060, 1131, 1160];

// ─── BUILD TABLE ──────────────────────────────────────────────────────────────
function buildTable(person, day, mins) {
  var displayCol = currentDisplayCol(mins);

  var h1 = '<tr>'
    + '<th class="hdr-main" rowspan="3" style="min-width:42px">Day</th>'
    + '<th class="hdr-main hdr-am" colspan="5">Theory Hours</th>'
    + '<th class="hdr-main hdr-none" rowspan="2">None</th>'
    + '<th class="hdr-main hdr-lunch-hdr" rowspan="3" style="writing-mode:vertical-rl;letter-spacing:2px;width:28px">LUNCH</th>'
    + '<th class="hdr-main hdr-pm" colspan="5">Theory Hours</th>'
    + '<th class="hdr-main hdr-none" rowspan="2">None</th>'
    + '</tr>';

  var h2 = '<tr>';
  ['8AM–8:50AM','9AM–9:50AM','10AM–10:50AM','11AM–11:50AM','12PM–12:50PM'].forEach(function(t){
    h2 += '<th class="hdr-sub hdr-am">' + t + '</th>';
  });
  ['2PM–2:50PM','3PM–3:50PM','4PM–4:50PM','5PM–5:50PM','6PM–6:50PM'].forEach(function(t){
    h2 += '<th class="hdr-sub hdr-pm">' + t + '</th>';
  });
  h2 += '</tr>';

  var h3 = '<tr>'
    + '<th class="hdr-sub hdr-am" colspan="2">8AM to 9:40AM</th>'
    + '<th class="hdr-sub hdr-am" colspan="2">9:51AM to 11:30AM</th>'
    + '<th class="hdr-sub hdr-am" colspan="2">11:40AM to 1:20PM</th>'
    + '<th class="hdr-sub hdr-pm" colspan="2">2PM to 3:40PM</th>'
    + '<th class="hdr-sub hdr-pm" colspan="2">3:51PM to 5:30PM</th>'
    + '<th class="hdr-sub hdr-pm" colspan="2">5:40PM to 7:20PM</th>'
    + '</tr>';

  var rows = '';
  for (var di = 0; di < DAYS.length; di++) {
    var d = DAYS[di];
    var isToday = (d === day);
    var reg = person.registered[d];

    rows += '<tr>';
    rows += '<td class="row-label' + (isToday ? ' today' : '') + '">' + d + '</td>';

    for (var c = 0; c < 13; c++) {
      if (c === COL_LUNCH) { rows += '<td class="lunch-cell">LUNCH</td>'; continue; }

      var isCur = isToday && (c === displayCol);
      var ts = THEORY_SLOT[d][c];
      var ls = LAB_SLOT[d][c];

      var thVal  = ts ? reg.theory[ts] : null;
      var lbVal  = ls ? reg.lab[ls]    : null;
      var hasTh  = thVal ? true : false;
      var hasLb  = lbVal ? true : false;
      var inClass = isCur && (hasTh || hasLb);
      var curCls  = isCur ? (inClass ? ' cur-class' : ' cur-free') : '';

      if (hasTh && hasLb) {
        rows += '<td class="slot slot-both' + curCls + '">'
          + '<span class="t-part">' + ts + '</span>/<span class="l-part">' + ls + '</span>'
          + '<span class="course-tag">' + (thVal.n || lbVal.n) + '</span>'
          + '</td>';
      } else if (hasTh) {
        rows += '<td class="slot slot-th' + curCls + '">'
          + ts
          + '<span class="course-tag">' + thVal.n + '</span>'
          + '</td>';
      } else if (hasLb) {
        rows += '<td class="slot slot-lab' + curCls + '">'
          + ls
          + '<span class="course-tag">' + lbVal.n + '</span>'
          + '</td>';
      } else {
        var label = (ts && ls) ? (ts + '/' + ls) : (ts || ls || '—');
        rows += '<td class="slot' + curCls + '">' + label + '</td>';
      }
    }
    rows += '</tr>';
  }

  var tableHTML = '<table class="ffcs" id="tbl-' + person.name + '"><thead>' + h1 + h2 + h3 + '</thead><tbody>' + rows + '</tbody></table>';
  return '<div class="table-container" id="tc-' + person.name + '">'
    + tableHTML
    + '<div class="time-needle" id="needle-' + person.name + '" style="display:none"></div>'
    + '</div>';
}

// ─── NEEDLE POSITIONING ───────────────────────────────────────────────────────
function updateNeedles() {
  var now  = new Date();
  var mins = now.getHours() * 60 + now.getMinutes();
  var secs = now.getSeconds();
  // fractional minutes including seconds
  var minsF = mins + secs / 60;
  var day   = todayCode();

  // Only show needle on weekdays during class hours
  var active = DAYS.indexOf(day) !== -1 && minsF >= 480 && minsF < 1160 && !(minsF >= 780 && minsF < 840);

  for (var i = 0; i < PEOPLE.length; i++) {
    var needle = document.getElementById('needle-' + PEOPLE[i].name);
    var tc     = document.getElementById('tc-' + PEOPLE[i].name);
    var tbl    = document.getElementById('tbl-' + PEOPLE[i].name);
    if (!needle || !tc || !tbl) continue;

    if (!active) { needle.style.display = 'none'; continue; }

    // Find which column the current time belongs to
    var targetCol = -1;
    for (var c = 0; c < 13; c++) {
      if (c === COL_LUNCH) continue;
      if (minsF >= NEEDLE_COL_START[c] && minsF < NEEDLE_COL_END[c]) { targetCol = c; break; }
    }
    if (targetCol === -1) { needle.style.display = 'none'; continue; }

    // Get real pixel positions from DOM — works correctly even when scrolled
    var tbody = tbl.querySelector('tbody');
    if (!tbody) { needle.style.display = 'none'; continue; }
    var firstRow = tbody.querySelector('tr');
    if (!firstRow) { needle.style.display = 'none'; continue; }
    var cells = firstRow.querySelectorAll('td');
    // cells[0] = day label, cells[1]=col0 ... cells[6]=col5, cells[7]=LUNCH, cells[8]=col7 ...
    // cellIdx = targetCol + 1  (works for all cols since lunch is col 6 → cells[7])
    var cellIdx = targetCol + 1;
    if (cellIdx >= cells.length) { needle.style.display = 'none'; continue; }

    var cell     = cells[cellIdx];
    var tcRect   = tc.getBoundingClientRect();
    var cellRect = cell.getBoundingClientRect();

    // How far through this column's exclusive time slice are we?
    var colSpan  = NEEDLE_COL_END[targetCol] - NEEDLE_COL_START[targetCol];
    var fraction = Math.max(0, Math.min(1, (minsF - NEEDLE_COL_START[targetCol]) / colSpan));

    // Pixel position of needle relative to table-container's left edge
    var cellLeft  = cellRect.left  - tcRect.left;
    var cellWidth = cellRect.width;
    var needleX   = cellLeft + fraction * cellWidth;

    needle.style.display = 'block';
    needle.style.left    = needleX + 'px';
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
var lastDay  = '';
var lastMins = -1;

function tick() {
  var now   = new Date();
  var mins  = now.getHours() * 60 + now.getMinutes();
  var day   = todayCode();

  // Clock — every second
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')   + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');

  // Rebuild cards/tables only when minute changes (or first load)
  if (day !== lastDay || mins !== lastMins) {
    lastDay  = day;
    lastMins = mins;

    document.getElementById('date').textContent =
      now.toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    var ph = '';
    for (var i = 0; i < PEOPLE.length; i++) ph += buildProfileCard(PEOPLE[i], day, mins);
    document.getElementById('profiles-grid').innerHTML = ph;

    var th = '';
    for (var j = 0; j < PEOPLE.length; j++) th += buildTTBlock(PEOPLE[j], day, mins);
    document.getElementById('timetables-section').innerHTML = th;
  }

  // Needle — every second (uses real DOM positions)
  updateNeedles();
}

tick();
setInterval(tick, 1000);
</script>
