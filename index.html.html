<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squad Timetable</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #1a1a2e;
  min-height: 100vh;
  color: white;
  padding: 15px;
}
.container { max-width: 1800px; margin: 0 auto; }

/* HEADER */
.header { text-align:center; margin-bottom:18px; }
.header h1 {
  font-size: 1.8rem;
  background: linear-gradient(90deg, #00d4ff, #9b59b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.clock-box {
  background: #16213e;
  border-radius: 12px;
  padding: 8px 28px;
  display: inline-block;
  border: 1px solid #2d2d5a;
}
.clock {
  font-size: 2.4rem;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  color: #00d4ff;
  letter-spacing: 2px;
}
.date { color: #888; font-size: 0.82rem; margin-top: 2px; }

/* PROFILES */
.profiles-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
@media(max-width:1100px){ .profiles-grid{ grid-template-columns: repeat(3,1fr); } }
@media(max-width:600px)  { .profiles-grid{ grid-template-columns: repeat(2,1fr); } }

.profile-card {
  background: #16213e;
  border-radius: 12px;
  padding: 14px 12px;
  border: 1px solid #2d2d5a;
  border-top: 4px solid var(--accent);
  text-align: center;
}
.profile-emoji { font-size: 2rem; margin-bottom: 4px; }
.profile-name  { font-size: 1rem; font-weight: bold; margin-bottom: 8px; }
.profile-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: bold;
  margin-bottom: 8px;
}
.badge-in      { background: #1e6e3e; color: #6effa6; }
.badge-out     { background: #6e1e1e; color: #ffa6a6; }
.badge-lunch   { background: #7d4e00; color: #ffc97e; }
.badge-free    { background: #1a3a5c; color: #7ec8ff; }
.badge-weekend { background: #3a2d5c; color: #c8b0ff; }
.profile-next  { font-size: 0.72rem; color: #aaa; line-height: 1.6; }
.profile-next strong { color: #fff; }

/* LEGEND */
.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 6px 0 20px;
  flex-wrap: wrap;
  font-size: 0.75rem;
  color: #888;
}
.legend span { display:flex; align-items:center; gap:5px; }
.ld { width:10px; height:10px; border-radius:2px; display:inline-block; }

/* TIMETABLES */
.timetables-section { display:flex; flex-direction:column; gap:28px; }

.tt-block {
  background: #16213e;
  border-radius: 12px;
  border: 1px solid #2d2d5a;
  overflow: hidden;
}
.tt-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid #2d2d5a;
  border-left: 5px solid var(--accent);
}
.tt-header-emoji { font-size: 1.5rem; }
.tt-header-name  { font-size: 1.1rem; font-weight: bold; flex:1; }
.tt-wrap { overflow-x: auto; padding: 12px; }

/* TABLE */
table.ffcs {
  border-collapse: collapse;
  width: 100%;
  min-width: 900px;
  font-size: 0.68rem;
}
table.ffcs th,
table.ffcs td {
  border: 1px solid #2d3561;
  padding: 5px 4px;
  text-align: center;
  vertical-align: middle;
  white-space: nowrap;
}

/* Header rows */
.hdr-main        { background: #0f172a; color: #94a3b8; font-weight:bold; font-size:0.65rem; }
.hdr-sub         { background: #1e293b; color: #64748b; font-size:0.6rem; font-style:italic; }
.hdr-am          { background: #1e3a5f; color: #7eb8ff; }
.hdr-pm          { background: #1f2d1e; color: #7ec87e; }
.hdr-lunch-hdr   { background: #4a3000; color: #ffc97e; font-weight:bold; }
.hdr-none        { background: #111827; color: #2d3561; }

/* Day label column */
td.row-label {
  background: #1e293b;
  color: #94a3b8;
  font-weight: bold;
  font-size: 0.68rem;
  width: 42px; min-width: 42px;
}
td.row-label.today { background: #2d3a8a; color: #a0b4ff; }

/* Lunch data cell */
td.lunch-cell {
  background: #4a3000 !important;
  color: #ffc97e !important;
  font-weight: bold;
  font-size: 0.7rem;
  writing-mode: vertical-rl;
  letter-spacing: 2px;
  min-width: 28px; width: 28px;
}

/* Gap/None data cell */
td.gap-cell { background: #111827; color: #2d3561; width: 22px; min-width:22px; }

/* Data cells */
td.slot      { background: #0f172a; color: #2d3561; min-width: 58px; }
td.slot-th   { background: #0d1f3a; color: #60a5fa; font-weight: bold; }
td.slot-lab  { background: #131f0a; color: #a3e635; font-weight: bold; }
td.slot-both { background: #101508; }
.t-part      { color: #60a5fa; font-weight:bold; }
.l-part      { color: #a3e635; font-weight:bold; }

/* Current-slot overlays */
td.cur-class {
  background: #5c0a0a !important;
  box-shadow: inset 0 0 0 2px #ff4444;
}
td.cur-class .t-part,
td.cur-class .l-part,
td.cur-class span { color: #fff !important; }

td.cur-free {
  background: #0a3a1a !important;
  box-shadow: inset 0 0 0 2px #22c55e;
}

.footer-note { text-align:center; color:#333; font-size:0.7rem; margin-top:12px; padding-bottom:10px; }
</style>
</head>

// ─── TIME HELPERS ─────────────────────────────────────────────────────────────
function nowMins() {
  var n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function todayCode() {
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date().getDay()];
}

function currentCol(m) {
  if (m >= 780 && m < 840) return COL_LUNCH;
  for (var c = 0; c < 13; c++) {
    if (c === COL_LUNCH) continue;
    if (m >= COL_START[c] && m < COL_END[c]) return c;
  }
  return -1;
}

function fmtTime(m) {
  var h   = Math.floor(m / 60);
  var min = m % 60;
  var ampm = h >= 12 ? 'PM' : 'AM';
  var hh   = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return hh + ':' + (min === 0 ? '00' : String(min).padStart(2,'0')) + ' ' + ampm;
}

function hasRegistered(person, day, col) {
  if (DAYS.indexOf(day) === -1) return false;
  var reg = person.registered[day];
  var ts  = THEORY_SLOT[day][col];
  var ls  = LAB_SLOT[day][col];
  if (ts && reg.theory[ts]) return true;
  if (ls && reg.lab[ls])    return true;
  return false;
}

// Next registered slot AFTER the current one today (returns formatted time string or null)
function nextClassTime(person, day, fromCol) {
  if (DAYS.indexOf(day) === -1) return null;
  for (var c = fromCol + 1; c < 13; c++) {
    if (c === COL_LUNCH) continue;
    if (hasRegistered(person, day, c)) return fmtTime(COL_START[c]);
  }
  // check subsequent days
  var di = DAYS.indexOf(day);
  for (var d = di + 1; d < DAYS.length; d++) {
    for (var c2 = 0; c2 < 13; c2++) {
      if (c2 === COL_LUNCH) continue;
      if (hasRegistered(person, DAYS[d], c2)) return DAYS[d] + ' ' + fmtTime(COL_START[c2]);
    }
  }
  return null;
}

// End time of the current class (or end of class run)
function classEndsAt(person, day, startCol) {
  var endCol = startCol;
  for (var c = startCol; c < 13; c++) {
    if (c === COL_LUNCH) break;
    if (hasRegistered(person, day, c)) endCol = c;
    else break;
  }
  return fmtTime(COL_END[endCol]);
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function statusOf(person, dayCode, col) {
  if (DAYS.indexOf(dayCode) === -1) {
    return { badge: 'badge-weekend', label: '🏖️ Weekend', nextLabel: '', nextVal: 'Enjoy!' };
  }
  var m = nowMins();
  if (col === -1) {
    if (m < COL_START[0]) {
      return { badge: 'badge-free', label: '😴 Before class', nextLabel: 'Classes start at', nextVal: '8:00 AM' };
    }
    if (m >= COL_END[11]) {
      return { badge: 'badge-in', label: '🏠 In Room', nextLabel: 'Done for today!', nextVal: '' };
    }
    var nxt = nextClassTime(person, dayCode, col);
    return { badge: 'badge-free', label: '🚶 Between slots', nextLabel: 'Next class:', nextVal: nxt || 'None today' };
  }
  if (col === COL_LUNCH) {
    return { badge: 'badge-lunch', label: '🍽️ Lunch', nextLabel: 'Back at', nextVal: '2:00 PM' };
  }
  if (hasRegistered(person, dayCode, col)) {
    var ends = classEndsAt(person, dayCode, col);
    return { badge: 'badge-out', label: '📚 In Class', nextLabel: 'Free at', nextVal: ends };
  }
  var nxt3 = nextClassTime(person, dayCode, col);
  return { badge: 'badge-in', label: '🏠 In Room', nextLabel: 'Next class:', nextVal: nxt3 || 'No more today' };
}

// ─── BUILD PROFILE CARD HTML ──────────────────────────────────────────────────
function buildProfileCard(person, dayCode, col) {
  var s = statusOf(person, dayCode, col);
  var nextHTML = s.nextLabel
    ? '<span>' + s.nextLabel + '</span><br><strong>' + s.nextVal + '</strong>'
    : '<strong>' + s.nextVal + '</strong>';
  return '<div class="profile-card" style="--accent:' + person.accent + '">'
    + '<div class="profile-emoji">' + person.emoji + '</div>'
    + '<div class="profile-name">'  + person.name  + '</div>'
    + '<div class="profile-badge '  + s.badge + '">' + s.label + '</div>'
    + '<div class="profile-next">'  + nextHTML + '</div>'
    + '</div>';
}

// ─── BUILD TABLE HTML ─────────────────────────────────────────────────────────
function buildTable(person, dayCode, col) {
  // 3 header rows + 5 data rows
  // Header row 1: Day(rowspan3) | Theory Hours AM(colspan5) | None | LUNCH(rowspan3) | Theory Hours PM(colspan5) | None
  // Header row 2: time labels AM x5 | — | time labels PM x5 | —
  // Header row 3: Lab Hours AM (colspan2 x3) | Lab Hours PM (colspan2 x3)

  // Header row 1: Theory Hours spans cols 0-4 (5 cols), then "None" col 5,
  //               then LUNCH (rowspan3), then Theory Hours cols 7-11 (5 cols), then "None" col 12.
  var h1 = '<tr>'
    + '<th class="hdr-main" rowspan="3" style="min-width:42px">Day</th>'
    + '<th class="hdr-main hdr-am" colspan="5">Theory Hours</th>'
    + '<th class="hdr-main hdr-none" rowspan="2">None</th>'
    + '<th class="hdr-main hdr-lunch-hdr" rowspan="3" style="writing-mode:vertical-rl;letter-spacing:2px;width:28px">LUNCH</th>'
    + '<th class="hdr-main hdr-pm" colspan="5">Theory Hours</th>'
    + '<th class="hdr-main hdr-none" rowspan="2">None</th>'
    + '</tr>';

  // Header row 2: individual time labels for cols 0-4 and 7-11
  var amLabels = ['8AM–8:50AM','9AM–9:50AM','10AM–10:50AM','11AM–11:50AM','12PM–12:50PM'];
  var pmLabels = ['2PM–2:50PM','3PM–3:50PM','4PM–4:50PM','5PM–5:50PM','6PM–6:50PM'];
  var h2 = '<tr>';
  amLabels.forEach(function(t){ h2 += '<th class="hdr-sub hdr-am">' + t + '</th>'; });
  // col 5 "None" already spanned by rowspan=2 above
  pmLabels.forEach(function(t){ h2 += '<th class="hdr-sub hdr-pm">' + t + '</th>'; });
  // col 12 "None" already spanned by rowspan=2 above
  h2 += '</tr>';

  // Header row 3: Lab Hours. Each lab block is 2 cols wide.
  // AM: cols 0+1 = 8AM-9:40, cols 2+3 = 9:51-11:30, cols 4+5 = 11:40-1:20
  // PM: cols 7+8 = 2PM-3:40, cols 9+10 = 3:51-5:30, cols 11+12 = 5:40-7:20
  var h3 = '<tr>'
    + '<th class="hdr-sub hdr-am" colspan="2">8AM to 9:40AM</th>'
    + '<th class="hdr-sub hdr-am" colspan="2">9:51AM to 11:30AM</th>'
    + '<th class="hdr-sub hdr-am" colspan="2">11:40AM to 1:20PM</th>'
    + '<th class="hdr-sub hdr-pm" colspan="2">2PM to 3:40PM</th>'
    + '<th class="hdr-sub hdr-pm" colspan="2">3:51PM to 5:30PM</th>'
    + '<th class="hdr-sub hdr-pm" colspan="2">5:40PM to 7:20PM</th>'
    + '</tr>';

  var rows = '';
  for (var di = 0; di < DAYS.length; di++) {
    var day    = DAYS[di];
    var isToday = (day === dayCode);
    var reg    = person.registered[day];

    rows += '<tr>';
    rows += '<td class="row-label' + (isToday ? ' today' : '') + '">' + day + '</td>';

    for (var c = 0; c < 13; c++) {
      // LUNCH column
      if (c === COL_LUNCH) {
        rows += '<td class="lunch-cell">LUNCH</td>';
        continue;
      }

      var isCur = isToday && (c === col);
      var curCls = '';
      if (isCur) {
        curCls = hasRegistered(person, day, c) ? ' cur-class' : ' cur-free';
      }

      var ts   = THEORY_SLOT[day][c];
      var ls   = LAB_SLOT[day][c];
      var hasTh = ts && reg.theory[ts] ? true : false;
      var hasLb = ls && reg.lab[ls]    ? true : false;

      if (hasTh && hasLb) {
        rows += '<td class="slot slot-both' + curCls + '">'
          + '<span class="t-part">' + ts + '</span>'
          + '/<span class="l-part">' + ls + '</span>'
          + '</td>';
      } else if (hasTh) {
        rows += '<td class="slot slot-th' + curCls + '">' + ts + '</td>';
      } else if (hasLb) {
        rows += '<td class="slot slot-lab' + curCls + '">' + ls + '</td>';
      } else {
        // Free slot — show slot codes greyed
        var label = (ts && ls) ? (ts + '/' + ls) : (ts || ls || '—');
        rows += '<td class="slot' + curCls + '">' + label + '</td>';
      }
    }
    rows += '</tr>';
  }

  return '<table class="ffcs"><thead>' + h1 + h2 + h3 + '</thead><tbody>' + rows + '</tbody></table>';
}

// ─── BUILD TIMETABLE BLOCK ────────────────────────────────────────────────────
function buildTTBlock(person, dayCode, col) {
  var s = statusOf(person, dayCode, col);
  return '<div class="tt-block" style="--accent:' + person.accent + '">'
    + '<div class="tt-header">'
    + '<span class="tt-header-emoji">' + person.emoji + '</span>'
    + '<span class="tt-header-name">'  + person.name  + '</span>'
    + '<span class="profile-badge ' + s.badge + '">' + s.label + '</span>'
    + '</div>'
    + '<div class="tt-wrap">' + buildTable(person, dayCode, col) + '</div>'
    + '</div>';
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function renderAll() {
  var now  = new Date();
  var mins = now.getHours() * 60 + now.getMinutes();
  var col  = currentCol(mins);
  var day  = todayCode();

  // Clock
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')   + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');

  document.getElementById('date').textContent =
    now.toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Profiles
  var profilesHTML = '';
  for (var i = 0; i < PEOPLE.length; i++) {
    profilesHTML += buildProfileCard(PEOPLE[i], day, col);
  }
  document.getElementById('profiles-grid').innerHTML = profilesHTML;

  // Timetables
  var ttHTML = '';
  for (var j = 0; j < PEOPLE.length; j++) {
    ttHTML += buildTTBlock(PEOPLE[j], day, col);
  }
  document.getElementById('timetables-section').innerHTML = ttHTML;
}

renderAll();
setInterval(renderAll, 1000);
</script>
</body>
</html>
